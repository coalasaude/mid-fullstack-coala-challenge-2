worker_processes auto;

events {
  worker_connections 2048;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;

  log_format healthflow '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';
  access_log /var/log/nginx/access.log healthflow;
  error_log  /var/log/nginx/error.log warn;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  client_max_body_size 25m;
  client_body_timeout 30s;
  client_header_timeout 15s;

  limit_req_zone  $binary_remote_addr zone=api_zone:10m rate=30r/s;
  limit_req_zone  $binary_remote_addr zone=auth_zone:10m rate=5r/s;
  limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

  upstream healthflow_frontend {
    server frontend:3001;
    keepalive 32;
  }

  upstream healthflow_backend {
    server backend:3000;
    keepalive 32;
  }

  server {
    listen 80 default_server;
    server_name _;

    add_header X-Frame-Options           "DENY"                           always;
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block"                  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;

    limit_conn conn_zone 20;

    location = /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location ~ ^/api/auth/(login|register) {
      limit_req zone=auth_zone burst=10 nodelay;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://healthflow_backend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_connect_timeout 10s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;
    }

    location /api/ {
      limit_req zone=api_zone burst=50 nodelay;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://healthflow_backend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    location /docs {
      proxy_pass http://healthflow_backend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
      proxy_pass http://healthflow_frontend;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
      proxy_pass http://healthflow_frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }
}
