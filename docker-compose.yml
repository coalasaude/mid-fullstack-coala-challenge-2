version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: healthflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthflow
      POSTGRES_PASSWORD: healthflow
      POSTGRES_DB: healthflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthflow -d healthflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: healthflow_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: healthflow
      RABBITMQ_DEFAULT_PASS: healthflow
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data: